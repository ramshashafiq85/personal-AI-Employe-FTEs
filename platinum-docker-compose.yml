# Platinum Tier: Cloud + Local Executive Architecture
# This Docker Compose deploys the CLOUD AGENT portion of the AI Employee
# The LOCAL AGENT runs on your machine (separate docker-compose.yml)

version: '3.8'

services:
  # ===========================
  # DATABASE LAYER
  # ===========================
  db:
    image: postgres:16
    container_name: platinum-odoo-db
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: ${ODOO_DB_PASSWORD:-odoo}
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================
  # ODOO ERP (Cloud 24/7)
  # ===========================
  odoo:
    image: odoo:19
    container_name: platinum-odoo
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8069:8069"
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=${ODOO_DB_PASSWORD:-odoo}
    volumes:
      - odoo-data:/var/lib/odoo
      - ./odoo-addons:/mnt/extra-addons
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8069"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================
  # CLOUD AGENT (Email + Social Drafts)
  # ===========================
  cloud-agent:
    build:
      context: .
      dockerfile: Dockerfile.cloud-agent
    container_name: platinum-cloud-agent
    depends_on:
      - odoo
    environment:
      - ODOO_URL=http://odoo:8069
      - ODOO_DB=${ODOO_DB:-AI-Employee}
      - ODOO_EMAIL=${ODOO_ADMIN_EMAIL}
      - ODOO_PASSWORD=${ODOO_ADMIN_PASSWORD}
      - GMAIL_CLIENT_ID=${GMAIL_CLIENT_ID}
      - GMAIL_CLIENT_SECRET=${GMAIL_CLIENT_SECRET}
      - GMAIL_REFRESH_TOKEN=${GMAIL_REFRESH_TOKEN}
      - FB_PAGE_ID=${FB_PAGE_ID}
      - FB_ACCESS_TOKEN=${FB_ACCESS_TOKEN}
      - IG_ACCOUNT_ID=${IG_ACCOUNT_ID}
      - IG_ACCESS_TOKEN=${IG_ACCESS_TOKEN}
      - TWITTER_API_KEY=${TWITTER_API_KEY}
      - TWITTER_API_SECRET=${TWITTER_API_SECRET}
      - TWITTER_ACCESS_TOKEN=${TWITTER_ACCESS_TOKEN}
      - TWITTER_ACCESS_SECRET=${TWITTER_ACCESS_SECRET}
      - VAULT_PATH=/vault
      - AGENT_ROLE=cloud
    volumes:
      - ./cloud-vault:/vault
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "print('healthy')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ===========================
  # NGINX REVERSE PROXY (HTTPS)
  # ===========================
  nginx:
    image: nginx:alpine
    container_name: platinum-nginx
    depends_on:
      - odoo
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

  # ===========================
  # REDIS (Cache & Queue)
  # ===========================
  redis:
    image: redis:7-alpine
    container_name: platinum-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # ===========================
  # HEALTH MONITOR
  # ===========================
  health-monitor:
    build:
      context: .
      dockerfile: Dockerfile.health-monitor
    container_name: platinum-health-monitor
    depends_on:
      - odoo
      - cloud-agent
      - redis
    environment:
      - CHECK_INTERVAL=60
      - ALERT_EMAIL=${ALERT_EMAIL}
      - WEBHOOK_URL=${HEALTH_WEBHOOK_URL}
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  # ===========================
  # NGROK (100% FREE Remote Access)
  # ===========================
  ngrok:
    image: ngrok/ngrok:latest
    container_name: platinum-ngrok
    restart: unless-stopped
    environment:
      - NGROK_AUTHTOKEN=2uBR8zqleI4bbDLNCkgmRVVaYA2_7LH7X1ProTBJxzmdth1ew
    ports:
      - "4040:4040"
    command: http platinum-nginx:80 --log=stdout

volumes:
  postgres-data:
  odoo-data:
